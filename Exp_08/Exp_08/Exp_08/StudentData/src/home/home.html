<h1>student details </h1>
<h6>{{name}}</h6>
<h6>{{age}}</h6>
<h6>{{course}}</h6> <!--Interpolation-->

<!-- <img src="img1.jpg " height="200" width="200" />(static) -->
<img [src]="path" height="200" width="200" /><!--Property binding(dyanmic)-->
<br><br>

<input type="button" (click)="changeImage()" value="Change" /><br><br>
<input [(ngModel)]="name" type="text" placeholder="Enter name" /><br><br>
<input [(ngModel)]="age" type="text" placeholder="Enter age" /><br><br>
<input [(ngModel)]="course" type="text" placeholder="Enter course" /><br><br>

<ul>
    @for(res of data; track res)
    {
    <li>{{res}}</li>
    }
</ul>

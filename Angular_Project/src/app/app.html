<main class="container">
  <header class="header">
    <div class="logo-area">
      <div class="angular-icon">A</div>
      <h1>Angular Task <span>Pro</span></h1>
    </div>
    <div class="stats">
      <div class="stat-item">
        <span class="label">Total</span>
        <span class="value">{{ totalTasks() }}</span>
      </div>
      <div class="stat-item">
        <span class="label">Done</span>
        <span class="value success">{{ completedTasks() }}</span>
      </div>
    </div>
  </header>

  <div class="input-card">
    <input 
      type="text" 
      [(ngModel)]="newTaskText" 
      (keyup.enter)="addTask()"
      placeholder="What needs to be done?"
      class="task-input"
    >
    <button (click)="addTask()" class="add-btn" [disabled]="!newTaskText().trim()">
      <span class="plus">+</span>
    </button>
  </div>

  <div class="task-list">
    @for (task of tasks(); track task.id) {
      <div class="task-item" [class.completed]="task.completed">
        <div class="task-content" (click)="toggleTask(task.id)">
          <div class="checkbox">
            @if (task.completed) {
              <span class="check-mark">✓</span>
            }
          </div>
          <span class="task-text">{{ task.text }}</span>
        </div>
        <button (click)="deleteTask(task.id)" class="delete-btn">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
          </svg>
        </button>
      </div>
    } @empty {
      <div class="empty-state">
        <div class="empty-icon">📝</div>
        <p>No tasks yet. Start by adding one above!</p>
      </div>
    }
  </div>

  <footer class="footer">
    <p>Built with Angular & Signals • {{ pendingTasks() }} pending</p>
  </footer>
</main>
